services:
  equipamentos:
    build: .
    image: equipamentos:latest
    container_name: equipamentos
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - equipamentos-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: equipamentos_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: equipamentos
      MYSQL_USER: equipamentos
      MYSQL_PASSWORD: equipamentos
      MYSQL_ROOT_PASSWORD: equipamentos
    networks:
      - equipamentos-network

  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: equipamentos_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      equipamentos-network:
        aliases:
          - auth.local

  selenium:
    image: selenium/standalone-chrome
    container_name: equipamentos_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - equipamentos-network
    shm_size: 2gb

networks:
  equipamentos-network:
